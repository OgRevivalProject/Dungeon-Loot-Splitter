<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dungeon Loot Splitter - Split treasure evenly among your adventuring party">
    <meta name="author" content="Dungeon Loot Splitter App">
    <meta name="theme-color" content="#1a0f0a">
    <title>Dungeon Loot Splitter</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Main title at the top -->
    <header>
        <div class="header-content">
            <div class="skull-left" aria-hidden="true">☠</div>
            <h1>Dungeon Loot Splitter</h1>
            <div class="skull-right" aria-hidden="true">☠</div>
        </div>
        <p class="header-subtitle">Divide the spoils. Trust no one. Split everything.</p>
    </header>

    <main>

        <!-- Section to enter party size -->
        <section class="panel" id="panel-party" aria-labelledby="party-heading">
            <h2 id="party-heading">⚔ Party Setup</h2>
            <div class="form-group">
                <label for="party-size">Number of Party Members:</label>
                <input
                    type="number"
                    id="party-size"
                    min="1"
                    placeholder="e.g. 4"
                    aria-describedby="party-error"
                >
                <span class="error-msg" id="party-error" role="alert" aria-live="polite"></span>
            </div>
        </section>

        <!-- Section to add loot items -->
        <section class="panel" id="panel-add-loot" aria-labelledby="add-loot-heading">
            <h2 id="add-loot-heading">💰 Add Loot</h2>
            <div class="form-group">
                <label for="loot-name">Loot Name:</label>
                <input
                    type="text"
                    id="loot-name"
                    placeholder="e.g. Dragon Scale"
                    aria-describedby="loot-error"
                >
            </div>
            <div class="form-group">
                <label for="loot-value">Loot Value:</label>
                <input
                    type="number"
                    id="loot-value"
                    min="0"
                    step="0.01"
                    placeholder="e.g. 150.00"
                >
            </div>
            <span class="error-msg" id="loot-error" role="alert" aria-live="polite"></span>
            <button id="add-loot-btn" type="button">Add Loot</button>
        </section>

        <!-- Shows current loot -->
        <section class="panel" id="panel-loot-list" aria-labelledby="loot-list-heading">
            <h2 id="loot-list-heading">📜 Loot List</h2>
            <div id="loot-list-container" aria-live="polite" aria-label="Current loot items">
                <p class="empty-msg" id="empty-loot-msg">No loot yet. Go find some treasure!</p>
            </div>
            <div class="total-display" id="running-total-area" aria-live="polite">
                <span class="total-label">Total Loot:</span>
                <span class="total-value" id="running-total">$0.00</span>
            </div>
        </section>

        <!-- Button to split the loot -->
        <section class="panel" id="panel-split" aria-labelledby="split-heading">
            <h2 id="split-heading">⚖ Split Loot</h2>
            <button id="split-loot-btn" type="button">Split Loot</button>
            <span class="error-msg" id="split-error" role="alert" aria-live="polite"></span>
            <div class="results-area" id="results-area" aria-live="polite">
                <div class="result-row" id="result-total-row">
                    <span class="result-label">Total Loot:</span>
                    <span class="result-value" id="result-total">—</span>
                </div>
                <div class="result-row" id="result-per-row">
                    <span class="result-label">Loot Per Party Member:</span>
                    <span class="result-value" id="result-per-member">—</span>
                </div>
            </div>
        </section>

        <!-- Explanation of how the logic works -->
        <section class="panel reflection" id="panel-reflection" aria-labelledby="reflection-heading">
            <h2 id="reflection-heading">🧙 Logic Explanation</h2>
            <div class="reflection-content">
                <!-- (unchanged content here) -->
            </div>
        </section>

    </main>

    <script src="js/script.js"></script>
</body>
</html>
